[phases.setup]
nixPkgs = ['php83', 'php83Extensions.pdo_mysql', 'php83Extensions.gd', 'php83Extensions.mbstring', 'php83Extensions.curl', 'php83Extensions.fileinfo', 'nginx']

[phases.build]
cmds = ['mkdir -p /var/log/nginx', 'mkdir -p /tmp/nginx']

[start]
cmd = 'php -S 0.0.0.0:${PORT:-8080} -t /app'
